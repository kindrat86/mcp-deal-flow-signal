name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Mon 09:00 UTC — keeps CI status fresh on Glama even without commits
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  build-and-typecheck:
    name: Build + Typecheck (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck (no emit)
        run: npx tsc --noEmit

      - name: Build (emit dist/)
        run: npm run build

      - name: Verify dist/server.js is executable
        run: node -e "import('./dist/server.js').then(()=>console.log('import-ok')).catch(e=>{console.error(e);process.exit(1)})"

      - name: MCP server smoke-test (list tools via stdio)
        run: |
          # Send an initialize + tools/list request to the stdio server and check for the
          # 7 expected tools (get_trending_startups, search_startups_by_sector,
          # get_startup_signal, get_signals_summary, get_scout_receipts, get_deep_signal,
          # get_methodology, share_result).
          (
            printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0.0"}}}'
            sleep 0.3
            printf '%s\n' '{"jsonrpc":"2.0","method":"notifications/initialized"}'
            sleep 0.3
            printf '%s\n' '{"jsonrpc":"2.0","id":2,"method":"tools/list"}'
            sleep 1.0
          ) | timeout 8 node dist/server.js > /tmp/mcp-out.jsonl 2>/tmp/mcp-err.log || true
          echo "=== stdout (last 4 lines) ==="
          tail -n 4 /tmp/mcp-out.jsonl
          echo "=== expected tools present? ==="
          for t in get_trending_startups search_startups_by_sector get_startup_signal get_signals_summary get_scout_receipts get_deep_signal get_methodology share_result; do
            if grep -q "\"name\":\"$t\"" /tmp/mcp-out.jsonl; then
              echo "✓ $t"
            else
              echo "✗ $t MISSING"
              exit 1
            fi
          done

  package-publishable:
    name: Package is publishable
    runs-on: ubuntu-latest
    needs: build-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: npm publish --dry-run
        env:
          # Dry-run never hits the registry; no NODE_AUTH_TOKEN needed.
          npm_config_dry_run: "true"
        run: npm publish --access public --dry-run
